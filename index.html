<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Test</title>

    <script src="https://cdn.tailwindcss.com"></script>

  </head>

  <body>
    <div class="min-h-screen flex flex-col">
        <main class="grow flex justify-center items-center">
        
            <form
              class="mx-auto w-full max-w-md space-y-4 rounded-lg border border-gray-300 bg-gray-100 p-6"
              noValidate
            >
              <div>
                <label
                  class="block text-sm font-medium text-gray-900"
                  htmlFor="sign-in-email"
                >
                  Email
                </label>

                <input
                  class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 leading-6 focus:border-indigo-500 focus:outline-none"
                  name="email"
                  id="sign-in-email"
                  type="email"
                  placeholder="Your email"
                  ref={emailSignInRef}
                  required
                />
              </div>

              <div>
                <label
                  class="block text-sm font-medium text-gray-900"
                  htmlFor="sign-in-password"
                >
                  Password
                </label>

                <input
                  class="mt-1 mb-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 leading-6 focus:border-indigo-500 focus:outline-none"
                  name="password"
                  id="sign-in-password"
                  type="password"
                  placeholder="Your password"
                  ref={passwordSignInRef}
                  required
                />
              </div>

              <button
                class="cursor-pointer block w-full rounded-lg border border-indigo-600 bg-indigo-600 px-12 py-3 text-sm font-medium text-white transition-colors hover:bg-transparent hover:text-indigo-600"
                type="submit"
              >
                Submit
              </button>
            </form>
      </div>
  </body>
</html>
