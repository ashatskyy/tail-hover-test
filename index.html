<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Test</title>

    <script src="https://cdn.tailwindcss.com"></script>

		  <style>
      @media (hover: hover) and (pointer: fine) {
        .register-btn:hover {
          background-color: #e880e8;
          color: white;
        }
      }
    </style>
  </head>

  <body>
    <div class="min-h-screen flex flex-col">
      <header
        class="pl-8 pr-8 mt-10  flex justify-between max-w-191 mx-auto"
      >
        <div
          class="flex text-lg gap-2  items-center p-4 rounded-lg  text-indigo-500"
        >
          <!-- <button
            class="font-[Poppins] bg-white text-black w-[clamp(155.56px,13.88vw,200px)] h-[clamp(43.56px,3.88vw,56px)] text-[clamp(14px,1.25vw,18px)] leading-[clamp(21px,1.88vw,27px)] rounded-[clamp(21px,1.88vw,27px)] portrait:w-[clamp(0px,51.4vw,550px)] portrait:h-[clamp(0px,9.34vw,100px)] portrait:text-[clamp(0px,3.36vw,36px)] portrait:leading-[clamp(0px,5.04vw,54px)] portrait:rounded-[clamp(0px,9.34vw,100px)] hover:bg-[#E880E8] hover:text-white shadow-[0_12px_15px_rgba(0,0,0,0.25)] transition-colors duration-300"
          > -->
          <button
               class="register-btn font-[Poppins] bg-white text-black w-[clamp(155.56px,13.88vw,200px)] h-[clamp(43.56px,3.88vw,56px)] text-[clamp(14px,1.25vw,18px)] leading-[clamp(21px,1.88vw,27px)] rounded-[clamp(21px,1.88vw,27px)] shadow-[0_12px_15px_rgba(0,0,0,0.25)] transition-colors duration-300 active:bg-[#E880E8] active:text-white"
      type="button"
    >
          
            Register
          </button>
        </div>
      </header>
      <main class="grow flex justify-center items-center">
        <form
          class="mx-auto w-full max-w-md space-y-4 rounded-lg border border-gray-300 bg-gray-100 p-6"
          novalidate
        >
          <div>
            <label
              class="block text-sm font-medium text-gray-900"
              htmlFor="sign-in-email"
            >
              Email
            </label>

            <input
              class="mt-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 leading-6 focus:border-indigo-500 focus:outline-none"
              name="email"
              id="sign-in-email"
              type="email"
              placeholder="Your email"
              ref="{emailSignInRef}"
              required
            />
          </div>

          <div>
            <label
              class="block text-sm font-medium text-gray-900"
              htmlFor="sign-in-password"
            >
              Password
            </label>

            <input
              class="mt-1 mb-1 w-full rounded-lg border border-gray-300 bg-white px-3 py-2 leading-6 focus:border-indigo-500 focus:outline-none"
              name="password"
              id="sign-in-password"
              type="password"
              placeholder="Your password"
              ref="{passwordSignInRef}"
              required
            />
          </div>

          <button
            class="cursor-pointer block w-full rounded-lg border border-indigo-600 bg-indigo-600 px-12 py-3 text-sm font-medium text-white transition-colors hover:bg-transparent hover:text-indigo-600"
            type="submit"
          >
            Submit
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
